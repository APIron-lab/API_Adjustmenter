openapi: 3.0.3
info:
  title: API Adjustmenter
  version: 0.3.0
  description: >
    Adjust messy JSON into a stable contract.
    This API normalizes and transforms JSON responses, detects schema drift,
    and supports reusable transform presets via Rulesets (ruleset_id).

    Response format follows APIron common response spec:
    Success: {result, meta} / Error: {error, meta}.
  license:
    name: MIT
servers:
  - url: http://127.0.0.1:8000
    description: Local development server

tags:
  - name: Adjustment
    description: Normalize/Transform/Diff for JSON payloads
  - name: Rulesets
    description: Store/reuse transform rules by ruleset_id
  - name: Health
    description: Health check

paths:
  /healthz:
    get:
      tags: [Health]
      summary: Health check
      operationId: healthz
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              examples:
                ok:
                  value:
                    result:
                      service: api-adjustmenter
                    meta:
                      execution_ms: 1
                      input_length: 0
                      request_id: "3b6a3b4c-1c4f-4b6a-9aa2-0d4fb4f14f6e"

  /normalize:
    post:
      tags: [Adjustment]
      summary: Normalize JSON payload (key style, number/date coercion, empty-to-null)
      operationId: normalize
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NormalizeRequest"
            examples:
              sample:
                value:
                  input:
                    userId: "12"
                    created_at: 1700000000
                    name: ""
                  options:
                    key_style: snake
                    coerce_numbers: true
                    empty_to_null: true
                    date_to_iso: true
      responses:
        "200":
          description: Normalized payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NormalizeResponse"
        "400":
          description: Bad request (validation/cast failure)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /transform:
    post:
      tags: [Adjustment]
      summary: Transform JSON payload with rules or ruleset_id (rename/defaults/cast/flatten/pick/omit)
      operationId: transform
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransformRequest"
            examples:
              with_rules_inline:
                summary: Inline rules (one-off)
                value:
                  input:
                    userId: "12"
                    profile:
                      zip: "1000001"
                      country: "JP"
                    extra: "x"
                  rules:
                    rename:
                      userId: user_id
                    cast:
                      user_id: int
                    flatten:
                      profile: profile_
                    pick: ["user_id", "profile_zip", "profile_country", "extra"]
                    omit: ["extra"]
              with_ruleset_id:
                summary: Use saved ruleset_id (recommended)
                value:
                  input:
                    userId: "12"
                    profile:
                      zip: "1000001"
                      country: "JP"
                  ruleset_id: "0185863b-0244-49bd-a899-b99afec32654"
              with_ruleset_override:
                summary: ruleset_id + override_rules (patch)
                value:
                  input:
                    userId: "12"
                    profile:
                      zip: "1000001"
                      country: "JP"
                    extra: "x"
                  ruleset_id: "0185863b-0244-49bd-a899-b99afec32654"
                  override_rules:
                    omit: ["extra"]
      responses:
        "200":
          description: Transformed payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransformResponse"
        "400":
          description: Bad request (validation/cast failure)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: ruleset_id not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /diff:
    post:
      tags: [Adjustment]
      summary: Detect schema drift between two JSON payloads (breaking change detection)
      operationId: diff
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DiffRequest"
      responses:
        "200":
          description: Diff result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiffResponse"
        "400":
          description: Bad request (validation failure)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /rulesets:
    get:
      tags: [Rulesets]
      summary: List rulesets (lightweight)
      operationId: listRulesets
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
          description: Max number of items
      responses:
        "200":
          description: List of rulesets
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RulesetListResponse"
    post:
      tags: [Rulesets]
      summary: Create ruleset preset (returns ruleset_id)
      operationId: createRuleset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RulesetCreateRequest"
            examples:
              sample:
                value:
                  name: my-default
                  ttl_seconds: null
                  rules:
                    rename:
                      userId: user_id
                    cast:
                      user_id: int
                    flatten:
                      profile: profile_
                    pick: ["user_id", "profile_zip", "profile_country"]
                    omit: []
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RulesetCreateResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /rulesets/{ruleset_id}:
    get:
      tags: [Rulesets]
      summary: Get ruleset by id
      operationId: getRuleset
      parameters:
        - in: path
          name: ruleset_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Ruleset details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RulesetGetResponseEnvelope"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      tags: [Rulesets]
      summary: Delete ruleset by id
      operationId: deleteRuleset
      parameters:
        - in: path
          name: ruleset_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RulesetDeleteResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    Meta:
      type: object
      required: [execution_ms, input_length, request_id]
      properties:
        execution_ms:
          type: integer
          minimum: 0
          description: Execution time in milliseconds.
        input_length:
          type: integer
          minimum: 0
          description: Request body length in bytes.
        request_id:
          type: string
          description: Request ID for traceability.
      additionalProperties: false

    ErrorBody:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
        hint:
          type: string
          nullable: true
      additionalProperties: false

    SuccessResponse:
      type: object
      required: [result, meta]
      properties:
        result: {}
        meta:
          $ref: "#/components/schemas/Meta"
      additionalProperties: false

    ErrorResponse:
      type: object
      required: [error, meta]
      properties:
        error:
          $ref: "#/components/schemas/ErrorBody"
        meta:
          $ref: "#/components/schemas/Meta"
      additionalProperties: false

    NormalizeOptions:
      type: object
      properties:
        key_style:
          type: string
          enum: [keep, snake, camel]
          default: keep
        coerce_numbers:
          type: boolean
          default: false
        empty_to_null:
          type: boolean
          default: false
        date_to_iso:
          type: boolean
          default: false
      additionalProperties: false

    NormalizeRequest:
      type: object
      required: [input]
      properties:
        input: {}
        options:
          $ref: "#/components/schemas/NormalizeOptions"
      additionalProperties: false

    CastType:
      type: string
      enum: [string, int, float, bool, json]

    TransformRules:
      type: object
      properties:
        rename:
          type: object
          additionalProperties:
            type: string
          default: {}
          description: Map of source path -> destination path.
        defaults:
          type: object
          additionalProperties: true
          default: {}
          description: Map of path -> default value (set if missing).
        cast:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/CastType"
          default: {}
          description: Map of path -> cast type.
        flatten:
          type: object
          additionalProperties:
            type: string
          default: {}
          description: Map of object path -> prefix for lifted keys.
        pick:
          type: array
          items:
            type: string
          default: []
          description: Keep only these dot-path fields (applied after other rules).
        omit:
          type: array
          items:
            type: string
          default: []
          description: Remove these dot-path fields (applied after pick).
      additionalProperties: false

    TransformRequest:
      type: object
      required: [input]
      properties:
        input: {}
        rules:
          $ref: "#/components/schemas/TransformRules"
        ruleset_id:
          type: string
          description: Use saved ruleset preset (recommended).
        override_rules:
          $ref: "#/components/schemas/TransformRules"
      additionalProperties: false
      description: >
        Provide either `rules` or `ruleset_id`. When both are provided, `ruleset_id` takes precedence.
        `override_rules` is applied only when `ruleset_id` is provided.

    DiffRequest:
      type: object
      required: [before, after]
      properties:
        before: {}
        after: {}
      additionalProperties: false

    TypeChange:
      type: object
      required: [path, from, to]
      properties:
        path:
          type: string
        from:
          type: string
        to:
          type: string
      additionalProperties: false

    DiffResult:
      type: object
      required: [removed_keys, added_keys, type_changes]
      properties:
        removed_keys:
          type: array
          items:
            type: string
        added_keys:
          type: array
          items:
            type: string
        type_changes:
          type: array
          items:
            $ref: "#/components/schemas/TypeChange"
      additionalProperties: false

    NormalizeResponse:
      type: object
      required: [result, meta]
      properties:
        result:
          type: object
          required: [output, adjustment]
          properties:
            output: {}
            adjustment:
              type: object
              additionalProperties: true
          additionalProperties: false
        meta:
          $ref: "#/components/schemas/Meta"
      additionalProperties: false

    TransformResponse:
      type: object
      required: [result, meta]
      properties:
        result:
          type: object
          required: [output, adjustment]
          properties:
            output: {}
            adjustment:
              type: object
              additionalProperties: true
          additionalProperties: false
        meta:
          $ref: "#/components/schemas/Meta"
      additionalProperties: false

    DiffResponse:
      type: object
      required: [result, meta]
      properties:
        result:
          type: object
          required: [diff, adjustment]
          properties:
            diff:
              type: object
              required: [breaking, diff]
              properties:
                breaking:
                  type: boolean
                diff:
                  $ref: "#/components/schemas/DiffResult"
              additionalProperties: false
            adjustment:
              type: object
              additionalProperties: true
          additionalProperties: false
        meta:
          $ref: "#/components/schemas/Meta"
      additionalProperties: false

    RulesetCreateRequest:
      type: object
      required: [name, rules]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 80
        rules:
          $ref: "#/components/schemas/TransformRules"
        ttl_seconds:
          type: integer
          nullable: true
          description: TTL seconds. null=default. 0 or negative=never expire.
      additionalProperties: false

    RulesetCreateResponse:
      type: object
      required: [result, meta]
      properties:
        result:
          type: object
          required: [ruleset_id, name]
          properties:
            ruleset_id:
              type: string
            name:
              type: string
            expires_at:
              type: number
              nullable: true
          additionalProperties: false
        meta:
          $ref: "#/components/schemas/Meta"
      additionalProperties: false

    RulesetSummary:
      type: object
      required: [ruleset_id, name, updated_at]
      properties:
        ruleset_id:
          type: string
        name:
          type: string
        updated_at:
          type: number
        expires_at:
          type: number
          nullable: true
      additionalProperties: false

    RulesetListResponse:
      type: object
      required: [result, meta]
      properties:
        result:
          type: object
          required: [items]
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/RulesetSummary"
          additionalProperties: false
        meta:
          $ref: "#/components/schemas/Meta"
      additionalProperties: false

    RulesetGetResponse:
      type: object
      required: [ruleset_id, name, rules, created_at, updated_at]
      properties:
        ruleset_id:
          type: string
        name:
          type: string
        rules:
          $ref: "#/components/schemas/TransformRules"
        created_at:
          type: number
        updated_at:
          type: number
        expires_at:
          type: number
          nullable: true
      additionalProperties: false

    RulesetGetResponseEnvelope:
      type: object
      required: [result, meta]
      properties:
        result:
          $ref: "#/components/schemas/RulesetGetResponse"
        meta:
          $ref: "#/components/schemas/Meta"
      additionalProperties: false

    RulesetDeleteResponse:
      type: object
      required: [result, meta]
      properties:
        result:
          type: object
          required: [deleted, ruleset_id]
          properties:
            deleted:
              type: boolean
            ruleset_id:
              type: string
          additionalProperties: false
        meta:
          $ref: "#/components/schemas/Meta"
      additionalProperties: false
